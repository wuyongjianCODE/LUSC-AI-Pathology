MODEL:
  META_ARCHITECTURE: "GeneralizedRCNN"
  WEIGHT: ""#"glip_large_model.pth" #"swin_large_patch4_window12_384_22k.pth"#"/home/data/jy/GLIP/OUTPUT_TRAIN_COUNT/model_0001000.pth"
#  RPN_ONLY: True
#  RPN_ARCHITECTURE: "VLDYHEAD"

  BACKBONE:
    CONV_BODY: "SWINT-FPN-RETINANET"
    OUT_CHANNELS: 256
    FREEZE_CONV_BODY_AT: 1  # 覆盖添加

  SWINT:
    EMBED_DIM: 192
    DEPTHS: (2, 2, 18, 2)
    NUM_HEADS: (6, 12, 24, 48)
    WINDOW_SIZE: 12_
    OUT_CHANNELS: (192, 384, 768, 1536)
    DROP_PATH_RATE: 0.4

  RETINANET:
    DETECTIONS_PER_IMG: 400


  LANGUAGE_BACKBONE:
    FREEZE: False
    MODEL_TYPE: "bert-base-uncased" # "roberta-base", "clip"
    MASK_SPECIAL: False

  RPN:
      USE_FPN: True
      ANCHOR_STRIDE: (4, 8, 16, 32, 64)
      PRE_NMS_TOP_N_TRAIN: 2000
      PRE_NMS_TOP_N_TEST: 1000
      POST_NMS_TOP_N_TEST: 1000
      FPN_POST_NMS_TOP_N_TEST: 1000
  ROI_HEADS:
    USE_FPN: True
  ROI_BOX_HEAD:
    POOLER_RESOLUTION: 7
    POOLER_SCALES: (0.25, 0.125, 0.0625, 0.03125)
    POOLER_SAMPLING_RATIO: 2
    FEATURE_EXTRACTOR: "FPN2MLPFeatureExtractor"
    PREDICTOR: "FPNPredictor"

  FCOS:
    DETECTIONS_PER_IMG: 400
  ATSS:
    DETECTIONS_PER_IMG: 400
DATASETS:
  TRAIN: ('lungmerged_grounding_train',)  #('lungcomb_grounding_train',)  # 覆盖原有值'coco1s_grounding_train','coco2s_grounding_train','coco3s_grounding_train',
  TEST: ('lungtest_2025_val',) #('central_2017BJ2_val',) #('lung9class_2025_val',) #('central_2017_val',) #('lungscc_2017_val',)  # 覆盖原有值('lungcomb_2025_val',) #('lungcomb_2025_val',) #

  ONE_HOT: False
  FLICKR_COPY: 8 # 0.15 * 8 = ~1.2M
  MIXED_COPY: 4 # 0.6 * 4 = ~2.4M
  OBJECT365_COPY: 2 # 1.4 * 2 = ~2.8M
  VG_COPY: 3 # 0.4 * 3 = ~1.2M
  IN_COPY: 2 # 0.67 * 2 = ~1.33M
  OI_COPY: 1 # 2M * 1 = 2M

  DISABLE_SHUFFLE: True  # 覆盖原有值
  ADD_DET_PROMPT: False
  RANDOM_SAMPLE_NEG: 85
  CONTROL_PROB: (0.0, 0.0, 0.5, 0.0)
  FURTHER_SCREEN: True
  CAPTION_CONF: 0.5
  CAPTION_NMS: -1.0
  CAPTION_MIN_BOX: 1

  SEPARATION_TOKENS: ". "

  PACK_RANDOM_CAPTION_NUMBER: 20
  NO_RANDOM_PACK_PROBABILITY: 0.4
  RANDOM_PACK_PROB: 0.5
  CAPTION_FORMAT_VERSION: "v2"
THRE: 0.5
INPUT:
  PIXEL_MEAN: [ 103.530, 116.280, 123.675 ]
  PIXEL_STD: [ 57.375, 57.120, 58.395 ]
  MIN_SIZE_TRAIN: 800
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MAX_SIZE_TEST: 1333

AUGMENT:
  MULT_MIN_SIZE_TRAIN: (800,)  # 覆盖原有值

DATALOADER:
  SIZE_DIVISIBILITY: 32

SOLVER:
  OPTIMIZER: ADAMW
  BASE_LR: 0.00001  # 覆盖原有值
  LANG_LR: 0.00001  # 覆盖原有值
  WEIGHT_DECAY: 0.01
  WEIGHT_DECAY_SCHEDULE: True
  STEPS: (0.67, 0.89)
  MAX_ITER: 8000  # 覆盖原有值
  IMS_PER_BATCH: 1  # 覆盖原有值
  WARMUP_ITERS: 2000
  WARMUP_FACTOR: 0.001
  CHECKPOINT_PERIOD: 0  # 覆盖原有值
  FIND_UNUSED_PARAMETERS: False  # 保持指定值
  USE_AMP: True  # 新增配置
  TEST_WITH_INFERENCE: True  # 新增配置
  CLIP_GRADIENTS:
    ENABLED: True
    CLIP_TYPE: "full_model"
    CLIP_VALUE: 1.0
    NORM_TYPE: 2.0

TEST:
  DURING_TRAINING: True  # 新增配置
  IMS_PER_BATCH: 1  # 新增配置
  EVAL_TASK: detection  # 新增配置

OUTPUT_DIR: 'OUTPUT_TRAIN_lungsccmrcnn'
VISUALIZE: True  # 新增配置
NEED_LABELBOX: True  # 新增配置
NEED_PREDJSON: True
NEED_2REALNAME: True